<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loopy 机票价格监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Microsoft YaHei,Arial,sans-serif;background:#FFF0F5;color:#3D2C3D;}
.top{background:linear-gradient(135deg,#FFB3C6,#E8608C);padding:14px 20px;display:flex;align-items:center;gap:12px;}
.top img{width:46px;height:46px;border-radius:50%;border:3px solid rgba(255,255,255,.85);object-fit:cover;}
.top h1{color:#fff;font-size:18px;}
.wrap{max-width:960px;margin:0 auto;padding:16px;}
.card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 6px 24px rgba(200,130,160,.1);}
.card h3{font-size:15px;color:#E8608C;margin-bottom:10px;}
.row{display:flex;justify-content:space-between;padding:9px 12px;border-bottom:1px solid #f5e6ea;font-size:14px;}
.row:last-child{border-bottom:none;}
.pr{color:#E85A7C;font-weight:700;}
.foot{text-align:center;padding:14px;color:#8C6B7A;font-size:11px;border-top:1px solid #f0d4dc;margin-top:6px;}
.gal{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.gal img{width:100%;height:120px;object-fit:cover;border-radius:8px;display:block;}
.hr{text-align:center;padding:20px 16px;margin-bottom:20px;}
.hr img{width:100px;height:100px;border-radius:50%;object-fit:cover;border:4px solid #fff;box-shadow:0 8px 28px rgba(232,96,140,.35);margin-bottom:10px;}
.hr h2{font-size:20px;color:#E85A7A;}
.hr p{color:#8C6B7A;font-size:12px;margin-top:4px;}
#tm{font-size:11px;color:#bbb;margin-top:6px;}
@media(max-width:600px){.gal{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="top">
  <img src="loopy.jpg" alt="L">
  <h1>Loopy 机票价格监控</h1>
</div>

<div class="wrap">

<div class="hr">
  <img src="loopy.jpg" alt="Loopy">
  <h2>和 Loopy 一起出发吧</h2>
  <p>粉色小浣熊帮你盯着机票价格</p>
  <div id="tm">加载中...</div>
</div>

<div class="card">
  <h3>中国最美风景</h3>
  <div class="gal" id="gal"></div>
</div>

<div class="card">
  <h3>今日特价机票</h3>
  <div class="row"><span>北京 - 上海</span><span class="pr">480元</span></div>
  <div class="row"><span>北京 - 广州</span><span class="pr">650元</span></div>
  <div class="row"><span>北京 - 成都</span><span class="pr">520元</span></div>
  <div class="row"><span>北京 - 杭州</span><span class="pr">390元</span></div>
  <div class="row"><span>北京 - 三亚</span><span class="pr">780元</span></div>
</div>

<div class="foot">Loopy 机票价格监控 每日更新</div>
</div>

<script>
var imgs=["https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&h=200&fit=crop","https://images.unsplash.com/photo-1470071459604-7b8ec44ffd0b?w=300&h=200&fit=crop","https://images.unsplash.com/photo-1495344517868-8ebaf0a2044d?w=300&h=200&fit=crop","https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=300&h=200&fit=crop","https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=300&h=200&fit=crop","https://images.unsplash.com/photo-1439066615861-d1af74d74000?w=300&h=200&fit=crop"];
var names=["黄山","桂林","西湖","张家界","漓江","九寨沟"];
var g=document.getElementById("gal");
for(var i=0;i<imgs.length;i++){var d=document.createElement("div");d.innerHTML='<img src="'+imgs[i]+'" alt="" loading="lazy" onerror="this.remove()"><div style="font-size:10px;color:#8C6B7A;padding:2px 0 0 4px">'+names[i]+'</div>';g.appendChild(d);}
function updateTime(){var d=new Date();document.getElementById("tm").textContent=d.toLocaleString("zh-CN");}
updateTime();setInterval(updateTime,1000);
</script>
</body>
</html>
