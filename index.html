<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- v2 --><title>Loopy 机票监控</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial,Microsoft YaHei,sans-serif;background:#FFF0F5;color:#3D2C3D;}
.topbar{background:linear-gradient(135deg,#FFB3C6,#E8608C);padding:14px 20px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(232,96,140,.3);}
.topbar img{width:46px;height:46px;border-radius:50%;border:3px solid rgba(255,255,255,.85);object-fit:cover;}
.topbar h1{color:#fff;font-size:18px;}
.outer{max-width:960px;margin:0 auto;padding:16px;}
.hero{text-align:center;background:#fff;border-radius:16px;padding:24px 16px 20px;margin-bottom:20px;box-shadow:0 8px 32px rgba(200,130,160,.12);}
.hero img{width:110px;height:110px;border-radius:50%;object-fit:cover;border:4px solid #fff;box-shadow:0 8px 28px rgba(232,96,140,.35);margin-bottom:10px;}
.hero h2{font-size:22px;color:#E85A7A;}
.hero p{color:#8C6B7A;font-size:13px;margin-top:4px;}
.box{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 6px 24px rgba(200,130,160,.1);}
.box h3{font-size:15px;color:#E8608C;margin-bottom:10px;}
.scenic{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.scenic img{width:100%;height:130px;object-fit:cover;border-radius:8px;display:block;}
.scenic .cap{font-size:11px;color:#8C6B7A;padding:4px 0 0 4px;}
.item{display:flex;justify-content:space-between;padding:9px 12px;border-bottom:1px solid #f5e6ea;font-size:14px;}
.item:last-child{border-bottom:none;}
.price{color:#E85A7C;font-weight:700;}
.foot{text-align:center;padding:14px;color:#8C6B7A;font-size:11px;border-top:1px solid #f0d4dc;margin-top:6px;}
#clock{font-size:12px;color:#aaa;margin-top:6px;}
@media(max-width:600px){.scenic{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <img src="loopy.jpg" alt="L">
  <h1>Loopy 机票监控</h1>
</div>

<div class="outer">

<div class="hero">
  <img src="loopy.jpg" alt="Loopy">
  <h2>和 Loopy 一起出发吧</h2>
  <p>粉色小浣熊帮你盯着机票价格</p>
  <div id="clock">加载中...</div>
</div>

<div class="box">
  <h3>当地风景每日更新</h3>
  <div class="scenic" id="scenic"></div>
</div>

<div class="box">
  <h3>实时价格</h3>
  <div class="item"><span>北京 上海</span><span class="price">480</span></div>
  <div class="item"><span>北京 广州</span><span class="price">650</span></div>
  <div class="item"><span>北京 成都</span><span class="price">520</span></div>
  <div class="item"><span>北京 杭州</span><span class="price">390</span></div>
  <div class="item"><span>北京 三亚</span><span class="price">780</span></div>
</div>

<div class="foot">Loopy 机票监控 每日更新</div>
</div>

<script>
var photos = [
  "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&h=200&fit=crop",
  "https://images.unsplash.com/photo-1470071459604-7b8ec44ffd0b?w=300&h=200&fit=crop",
  "https://images.unsplash.com/photo-1495344517868-8ebaf0a2044d?w=300&h=200&fit=crop",
  "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=300&h=200&fit=crop",
  "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=300&h=200&fit=crop",
  "https://images.unsplash.com/photo-1439066615861-d1af74d74000?w=300&h=200&fit=crop"
];
var caps = ["黄山","桂林","西湖","张家界","漓江","九寨沟"];
var g = document.getElementById("scenic");
for(var i=0;i<photos.length;i++){
  var d = document.createElement("div");
  d.innerHTML = '<img src="'+photos[i]+'" alt="" loading="lazy" onerror="this.remove()"><div class="cap">'+caps[i]+'</div>';
  g.appendChild(d);
}

function clock(){
  var d = new Date();
  document.getElementById("clock").textContent = d.toLocaleString("zh-CN");
}
clock();
setInterval(clock,1000);
</script>
</body>
</html>
