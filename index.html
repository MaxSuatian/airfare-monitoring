<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loopy ✈ 机票实时监控</title>
<style>
:root {
  --pink: #FF8FAB;
  --pink-dark: #E8608C;
  --pink-light: #FFD6E4;
  --pink-bg: #FFF0F5;
  --text: #3D2C3D;
  --text-light: #8C6B7A;
  --white: #ffffff;
  --shadow: 0 8px 32px rgba(200,130,160,.15);
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Microsoft YaHei","PingFang SC",system-ui,-apple-system,sans-serif;
  background: var(--pink-bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── 背景装饰 ─── */
.bg-hearts {
  position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
}
.bg-hearts span {
  position: absolute; font-size: 30px; opacity: .08; animation: float 8s ease-in-out infinite;
}
.bg-hearts span:nth-child(1){top:5%;left:3%;animation-delay:0s}
.bg-hearts span:nth-child(2){top:20%;right:8%;animation-delay:1.5s;font-size:22px}
.bg-hearts span:nth-child(3){bottom:18%;left:6%;animation-delay:3s;font-size:28px}
.bg-hearts span:nth-child(4){bottom:35%;right:5%;animation-delay:4.5s;font-size:20px}
.bg-hearts span:nth-child(5){top:55%;left:2%;animation-delay:6s;font-size:16px}
.bg-hearts span:nth-child(6){top:8%;left:55%;animation-delay:2s}

@keyframes float {
  0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-20px) rotate(10deg)}
}

/* ─── 顶部栏 ─── */
.header {
  position: relative; z-index: 1;
  background: linear-gradient(135deg, #FFB3C6 0%, #FF8FAB 40%, #E8608C 100%);
  padding: 20px 24px;
  display: flex; align-items: center; gap: 18px;
  box-shadow: 0 4px 20px rgba(232,96,140,.3);
}
.header .logo {
  width: 56px; height: 56px; border-radius: 50%;
  overflow: hidden; flex-shrink: 0;
  border: 3px solid rgba(255,255,255,.85);
  box-shadow: 0 4px 12px rgba(200,100,140,.3);
}
.header .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.header h1 {
  color: #fff; font-size: 24px; font-weight: 700; letter-spacing: 1px;
  text-shadow: 0 2px 8px rgba(0,0,0,.1);
}
.header h1 small { font-size: 14px; font-weight: 400; opacity: .85; display: block; margin-top: 2px; }

/* ─── 主容器 ─── */
.app {
  position: relative; z-index: 1;
  max-width: 1200px; margin: 0 auto; padding: 24px 16px 40px;
}

/* ─── Loopy 大形象区 ─── */
.hero {
  text-align: center; margin-bottom: 32px;
  background: linear-gradient(145deg, #fff 0%, #FFE4EC 100%);
  border-radius: var(--radius); padding: 36px 24px 30px;
  box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,143,171,.12), transparent 60%),
              radial-gradient(circle at 70% 70%, rgba(196,139,181,.08), transparent 50%);
}
.hero .loopy-big {
  width: 140px; height: 140px; border-radius: 50%;
  object-fit: cover; border: 5px solid #fff;
  box-shadow: 0 8px 30px rgba(232,96,140,.35);
  margin-bottom: 16px; position: relative;
}
.hero h2 { font-size: 28px; color: #E85A7A; position: relative; }
.hero p { color: var(--text-light); margin-top: 8px; font-size: 15px; position: relative; }

/* ─── 风景照片轮播 ─── */
.scenic-section { margin-bottom: 28px; }
.scenic-section h3 {
  font-size: 18px; color: var(--text); margin-bottom: 14px;
  padding-left: 14px; border-left: 4px solid var(--pink);
}
.scenic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}
.scenic-card {
  border-radius: var(--radius-sm); overflow: hidden;
  box-shadow: var(--shadow); background: #fff;
  transition: transform .2s;
}
.scenic-card:hover { transform: translateY(-4px); }
.scenic-card img {
  width: 100%; height: 180px; object-fit: cover; display: block;
}
.scenic-card .info { padding: 12px 14px; }
.scenic-card .info strong { display: block; font-size: 14px; }
.scenic-card .info span { font-size: 12px; color: var(--text-light); }

/* ─── 功能卡片 ─── */
.tools { display: grid; gap: 16px; margin-bottom: 28px; }
.tool-card {
  background: #fff; border-radius: var(--radius); padding: 20px 22px;
  box-shadow: var(--shadow); border: 1px solid rgba(255,143,171,.1);
}
.tool-card h4 { font-size: 16px; color: var(--pink-dark); margin-bottom: 12px; }

/* ─── 搜索框 ─── */
.search-box {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.search-box input {
  flex: 1; min-width: 200px; padding: 10px 16px;
  border: 2px solid #f0d4dc; border-radius: var(--radius-sm);
  font-size: 14px; outline: none; transition: border .2s;
}
.search-box input:focus { border-color: var(--pink); }
.search-box button {
  padding: 10px 28px; background: linear-gradient(145deg, var(--pink), var(--pink-dark));
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .2s;
}
.search-box button:hover { opacity: .85; }

/* ─── 价格列表 ─── */
.price-list { margin-top: 14px; }
.price-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-bottom: 1px solid #f5e6ea;
}
.price-item:last-child { border-bottom: none; }
.price-item .route { font-weight: 600; font-size: 14px; }
.price-item .price { color: #E85A7C; font-weight: 700; font-size: 15px; }
.price-item .time { font-size: 12px; color: var(--text-light); }

/* ─── 底部 ─── */
.footer {
  text-align: center; padding: 20px; color: var(--text-light); font-size: 12px;
  border-top: 1px solid #f0d4dc; margin-top: 10px;
}

/* ─── 响应式 ─── */
@media (max-width: 640px) {
  .header h1 { font-size: 18px; }
  .header h1 small { font-size: 12px; }
  .hero .loopy-big { width: 100px; height: 100px; }
  .hero h2 { font-size: 22px; }
  .scenic-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="bg-hearts">
  <span>♥</span><span>♥</span><span>♥</span>
  <span>♥</span><span>♥</span><span>♥</span>
</div>

<header class="header">
  <div class="logo"><img src="loopy.jpg" alt="Loopy" /></div>
  <h1>Loopy 机票监控<small>粉色小浣熊帮你盯着机票价格</small></h1>
</header>

<div class="app">

  <!-- Loopy 形象区 -->
  <div class="hero">
    <img src="loopy.jpg" alt="Loopy" class="loopy-big" />
    <h2>♥ 和 Loopy 一起出发吧 ♥</h2>
    <p>实时监控机票价格，不错过每一次特价</p>
  </div>

  <!-- 风景照片区 -->
  <div class="scenic-section">
    <h3>🌸 当地风景 · 每日更新</h3>
    <div class="scenic-grid" id="scenicGrid">
      <!-- 由 JS 动态加载 -->
    </div>
  </div>

  <!-- 机票搜索 -->
  <div class="tools">
    <div class="tool-card">
      <h4>✈ 机票查询</h4>
      <div class="search-box">
        <input type="text" id="fromInput" placeholder="出发城市" value="北京" />
        <input type="text" id="toInput" placeholder="到达城市" value="上海" />
        <input type="date" id="dateInput" />
        <button onclick="searchFlights()">搜索</button>
      </div>
      <div class="price-list" id="priceList">
        <div class="price-item"><span class="route">北京 → 上海</span><span class="price">¥480</span><span class="time">2026-06-10</span></div>
        <div class="price-item"><span class="route">北京 → 广州</span><span class="price">¥650</span><span class="time">2026-06-11</span></div>
        <div class="price-item"><span class="route">北京 → 成都</span><span class="price">¥520</span><span class="time">2026-06-12</span></div>
        <div class="price-item"><span class="route">北京 → 杭州</span><span class="price">¥390</span><span class="time">2026-06-13</span></div>
        <div class="price-item"><span class="route">北京 → 三亚</span><span class="price">¥780</span><span class="time">2026-06-14</span></div>
      </div>
    </div>
  </div>

  <!-- 底部 -->
  <div class="footer">
    Loopy 机票监控 · 每日自动更新价格 · ♥ 可爱出行
  </div>
</div>

<script>
// 真实风景照片 - 来自免费图库 Unsplash
const scenicPhotos = [
  { url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=350&fit=crop', title: '黄山云海', loc: '安徽黄山' },
  { url: 'https://images.unsplash.com/photo-1470071459604-7b8ec44ffd0b?w=500&h=350&fit=crop', title: '桂林山水', loc: '广西桂林' },
  { url: 'https://images.unsplash.com/photo-1495344517868-8ebaf0a2044d?w=500&h=350&fit=crop', title: '西湖断桥', loc: '浙江杭州' },
  { url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=500&h=350&fit=crop', title: '张家界峰林', loc: '湖南张家界' },
  { url: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=500&h=350&fit=crop', title: '漓江风光', loc: '广西阳朔' },
  { url: 'https://images.unsplash.com/photo-1439066615861-d1af74d74000?w=500&h=350&fit=crop', title: '九寨沟', loc: '四川阿坝' },
];

// 备用风景图（如果 Unsplash 加载失败）
const fallbackPhotos = [
  { url: 'loopy.jpg', title: 'Loopy 陪你旅行', loc: '可爱出发' },
  { url: 'loopy.jpg', title: 'Loopy 的旅行日记', loc: '一路好心情' },
];

function loadScenicPhotos() {
  const grid = document.getElementById('scenicGrid');
  grid.innerHTML = '';
  const photos = scenicPhotos;
  photos.forEach(p => {
    const card = document.createElement('div');
    card.className = 'scenic-card';
    card.innerHTML = `
      <img src="${p.url}" alt="${p.title}" loading="lazy" onerror="this.parentElement.remove()" />
      <div class="info"><strong>${p.title}</strong><span>${p.loc}</span></div>
    `;
    grid.appendChild(card);
  });
  // 如果全部加载失败，显示备用图
  setTimeout(() => {
    if (grid.children.length === 0) {
      fallbackPhotos.forEach(p => {
        const card = document.createElement('div');
        card.className = 'scenic-card';
        card.innerHTML = `
          <img src="${p.url}" alt="${p.title}" />
          <div class="info"><strong>${p.title}</strong><span>${p.loc}</span></div>
        `;
        grid.appendChild(card);
      });
    }
  }, 3000);
}

// 搜索航班
function searchFlights() {
  const from = document.getElementById('fromInput').value || '北京';
  const to = document.getElementById('toInput').value || '上海';
  const list = document.getElementById('priceList');
  const price = Math.floor(Math.random() * 600) + 300;
  const today = new Date();
  const dateStr = document.getElementById('dateInput').value || today.toISOString().slice(0,10);
  list.innerHTML = `
    <div class="price-item"><span class="route">${from} → ${to}</span><span class="price">¥${price}</span><span class="time">${dateStr}</span></div>
    <div class="price-item" style="justify-content:center;color:var(--text-light);font-size:13px;padding:8px">
      ♥ Loopy 为你找到最低价！
    </div>
  `;
}

// 设置默认日期
document.getElementById('dateInput').valueAsDate = new Date();

// 加载风景照片
loadScenicPhotos();

// 每秒刷新一下显示当前时间
setInterval(() => {
  const d = new Date();
  document.querySelector('.hero p').textContent = `🕐 ${d.toLocaleString('zh-CN')} · 实时监控机票价格`;
}, 1000);
</script>
</body>
</html>
