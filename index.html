<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loopy 机票监控</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Microsoft YaHei", sans-serif; background: #FFF5F7; color: #3D2C3D; min-height: 100vh; display: grid; place-items: center; }
.card { background: #fff; border-radius: 20px; padding: 32px; text-align: center; box-shadow: 0 12px 40px rgba(200,100,140,.15); max-width: 420px; width: 90%; }
.loopy-img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #FF7B9C; box-shadow: 0 8px 24px rgba(232,90,122,.25); margin-bottom: 16px; }
h1 { font-size: 24px; background: linear-gradient(135deg, #FF7B9C, #D48FB5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
p { color: #9A7B8A; margin: 8px 0 20px; font-size: 14px; }
.btn { background: linear-gradient(145deg, #FF7B9C, #E85A7A); color: #fff; border: 0; border-radius: 12px; padding: 12px 32px; font-size: 16px; cursor: pointer; font-weight: 700; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,90,122,.3); }
</style>
</head>
<body>
<div class="card">
  <img src="loopy.jpg" class="loopy-img" alt="Loopy" />
  <h1>Loopy &#x2708; 机票监控</h1>
  <p>粉色小浣熊帮你盯着机票价格</p>
  <button class="btn" onclick="alert('Loopy 说：嗨！我在看着呢！')">&#9829; 点我试试</button>
</div>
</body>
</html>
