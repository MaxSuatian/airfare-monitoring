<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loopy ✈ 机票实时监控</title>
  <style>
    :root {
      --bg: #FFF5F7; --panel: #ffffff; --panel-2: #FFE8EE;
      --text: #3D2C3D; --muted: #9A7B8A; --line: #F5D0DA;
      --primary: #FF7B9C; --primary-dark: #E85A7A;
      --primary-soft: #FFD6E0; --accent: #D48FB5;
      --green: #7BC8A4; --orange: #F2A66A; --red: #E86868;
      --shadow: 0 8px 28px rgba(200,100,140,.12);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      background: radial-gradient(ellipse at 15% 8%, rgba(255,123,156,.12), transparent 400px), radial-gradient(ellipse at 85% 92%, rgba(212,143,181,.10), transparent 380px), linear-gradient(175deg, rgba(255,214,224,.4), rgba(255,245,247,0) 300px), var(--bg);
      color: var(--text);
    }
    button, input, select { font: inherit; }
    .app { width: min(1440px, calc(100% - 28px)); margin: 0 auto; padding: 18px 0 24px; }
    .loopy-floating { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .loopy-floating img { position: absolute; border-radius: 50%; object-fit: cover; animation: float 8s ease-in-out infinite; }
    .loopy-floating img:nth-child(1) { top: 2%; left: 2%; width: 56px; height: 56px; opacity: .08; }
    .loopy-floating img:nth-child(2) { top: 15%; right: 3%; width: 42px; height: 42px; opacity: .06; animation-delay: 1s; }
    .loopy-floating img:nth-child(3) { bottom: 10%; left: 4%; width: 48px; height: 48px; opacity: .07; animation-delay: .5s; }
    .loopy-floating img:nth-child(4) { bottom: 25%; right: 2%; width: 36px; height: 36px; opacity: .05; animation-delay: 2s; }
    .loopy-floating img:nth-child(5) { top: 45%; left: 1%; width: 30px; height: 30px; opacity: .06; animation-delay: .3s; }
    .loopy-floating img:nth-child(6) { top: 5%; left: 45%; width: 34px; height: 34px; opacity: .05; animation-delay: 1.5s; }
    @keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 25% { transform: translateY(-12px) rotate(3deg); } 75% { transform: translateY(8px) rotate(-2deg); } }
    .topbar { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; justify-content: space-between; margin-bottom: 16px; position: relative; z-index: 1; }
    .brand { display: flex; gap: 16px; align-items: center; }
    .loopy-avatar { width: 64px; height: 64px; border-radius: 20px; overflow: hidden; border: 3px solid rgba(255,255,255,.9); box-shadow: 0 8px 24px rgba(232,90,122,.25); position: relative; cursor: pointer; transition: transform .3s; flex: 0 0 auto; }
    .loopy-avatar:hover { transform: scale(1.06) rotate(-2deg); }
    .loopy-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .loopy-avatar .badge { position: absolute; right: -4px; bottom: -4px; width: 22px; height: 22px; border-radius: 50%; background: #FF4D7A; border: 2px solid #fff; display: grid; place-items: center; font-size: 10px; color: #fff; }
    .brand-text h1 { margin: 0; font-size: clamp(20px, 3vw, 28px); color: #5A2D4A; }
    .brand-text h1 .highlight { background: linear-gradient(135deg, #FF7B9C, #D48FB5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .brand-text .tagline { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .status-strip { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
    .pill { min-height: 32px; display: inline-flex; align-items: center; gap: 7px; padding: 0 13px; border: 1px solid var(--line); border-radius: 999px; background: rgba(255,255,255,.82); color: var(--muted); font-size: 12px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px rgba(123,200,164,.13); }
    .layout { display: grid; grid-template-columns: 320px minmax(0, 1fr); gap: 16px; align-items: start; position: relative; z-index: 1; }
    .panel { background: rgba(255,255,255,.92); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .side { position: sticky; top: 14px; }
    .section { padding: 15px; border-bottom: 1px solid var(--line); }
    .section:last-child { border-bottom: 0; }
    .section h2, .content-head h2, .card h3 { margin: 0; font-size: 15px; }
    .section-sub { margin: 5px 0 0; color: var(--muted); font-size: 12px; }
    .form-grid { display: grid; gap: 11px; margin-top: 13px; }
    .field { display: grid; gap: 6px; }
    label { color: #6B3D55; font-size: 12px; font-weight: 600; }
    input, select { width: 100%; height: 40px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--text); padding: 0 11px; outline: none; }
    input:focus, select:focus { border-color: rgba(232,90,122,.7); box-shadow: 0 0 0 3px rgba(255,123,156,.18); }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .button-row { display: grid; grid-template-columns: 1fr 42px; gap: 9px; margin-top: 1px; }
    .btn { height: 40px; border: 1px solid transparent; border-radius: 10px; background: linear-gradient(145deg, #FF7B9C, #E85A7A); color: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 7px; font-weight: 700; font-size: 14px; transition: all .16s; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,90,122,.3); }
    .icon-btn { width: 42px; padding: 0; background: #fff; color: var(--primary-dark); border-color: var(--line); }
    .secondary { background: #fff; color: var(--text); border-color: var(--line); padding: 0 12px; font-size: 13px; }
    .segmented { display: grid; grid-template-columns: repeat(3, 1fr); padding: 4px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; gap: 4px; }
    .segmented button { height: 33px; border: 0; border-radius: 8px; background: transparent; color: var(--muted); cursor: pointer; font-weight: 700; font-size: 12px; }
    .segmented button.active { background: #fff; color: #D45A7A; }
    .checks { display: grid; gap: 8px; margin-top: 12px; }
    .check { display: flex; align-items: center; gap: 8px; color: #5A3D4A; font-size: 13px; }
    .check input { width: 16px; height: 16px; accent-color: var(--primary); }
    .content { display: grid; gap: 16px; min-width: 0; }
    .content-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: center; padding: 15px; }
    .content-head p { margin: 5px 0 0; color: var(--muted); font-size: 12px; }
    .head-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; padding: 0 15px 15px; }
    .metric { padding: 13px; min-height: 96px; display: grid; align-content: space-between; background: var(--panel); border: 1px solid var(--line); border-radius: 12px; position: relative; }
    .metric span { color: var(--muted); font-size: 12px; }
    .metric strong { display: block; margin-top: 6px; font-size: 26px; line-height: 1; }
    .metric small { color: var(--green); font-weight: 700; font-size: 12px; }
    .grid-2 { display: grid; grid-template-columns: minmax(0, 1.25fr) minmax(280px, .75fr); gap: 16px; padding: 0 15px 15px; }
    .card { min-width: 0; }
    .card-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 12px; }
    .muted { color: var(--muted); font-size: 12px; }

    .destination-card { display: grid; grid-template-columns: minmax(260px, .9fr) minmax(0, 1.1fr); gap: 0; overflow: hidden; border-radius: var(--radius); }
    .destination-visual { min-height: 280px; position: relative; background: linear-gradient(135deg, #FFD6E0, #D48FB5); border-right: 1px solid var(--line); overflow: hidden; }
    .destination-visual img.main-photo { width: 100%; height: 100%; min-height: 280px; display: block; object-fit: cover; transition: opacity .5s; }
    .destination-visual img.main-photo.loading { opacity: 0; }
    .destination-visual .loopy-watermark { position: absolute; right: 8px; bottom: 8px; width: 44px; height: 44px; border-radius: 50%; object-fit: cover; opacity: .15; pointer-events: none; }
    .destination-badge { position: absolute; left: 12px; top: 12px; display: inline-flex; align-items: center; gap: 6px; min-height: 26px; padding: 0 11px; border-radius: 999px; background: rgba(255,255,255,.88); color: #6B2E4A; font-size: 11px; font-weight: 800; z-index: 2; }
    .destination-badge .mini-loopy { width: 18px; height: 18px; border-radius: 50%; object-fit: cover; display: inline-block; }
    .gallery-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 2; width: 30px; height: 30px; border-radius: 50%; border: 2px solid rgba(255,255,255,.7); background: rgba(255,255,255,.82); color: #D45A7A; cursor: pointer; display: grid; place-items: center; font-size: 15px; font-weight: 700; }
    .gallery-btn:hover { background: #fff; }
    .gallery-btn.prev { left: 10px; }
    .gallery-btn.next { right: 10px; }
    .image-counter { position: absolute; right: 12px; top: 12px; z-index: 2; padding: 3px 9px; border-radius: 999px; background: rgba(0,0,0,.4); color: #fff; font-size: 11px; font-weight: 700; }
    .destination-refresh { position: absolute; right: 12px; bottom: 12px; width: 34px; height: 34px; border-radius: 50%; border: 2px solid rgba(255,255,255,.65); background: rgba(255,255,255,.82); color: #D45A7A; cursor: pointer; display: grid; place-items: center; font-size: 15px; z-index: 2; }
    .destination-refresh:hover { background: #fff; transform: scale(1.08); }
    .destination-copy { padding: 16px; display: grid; gap: 10px; align-content: center; background: linear-gradient(135deg, rgba(255,214,224,.86), rgba(255,255,255,.92) 54%), #fff; }
    .destination-copy h2 { margin: 0; font-size: clamp(18px, 2vw, 26px); }
    .destination-copy p { margin: 0; color: var(--muted); line-height: 1.65; font-size: 13px; }
    .destination-meta { display: flex; gap: 7px; flex-wrap: wrap; }
    .destination-chip { display: inline-flex; align-items: center; min-height: 26px; padding: 0 9px; border-radius: 999px; background: rgba(212,143,181,.1); color: #7B3D6B; font-size: 11px; font-weight: 800; }
    .ai-panel { display: grid; gap: 8px; padding: 11px; border: 1px solid var(--line); border-radius: 10px; background: rgba(255,240,245,.86); margin-top: 14px; }
    .ai-row { display: grid; grid-template-columns: 1fr auto; gap: 9px; align-items: center; }
    .ai-prompt { margin: 0; color: #6B3D55; font-size: 11px; }
    .ai-status { color: var(--muted); font-size: 11px; font-weight: 700; }
    .chart-wrap { height: 230px; display: grid; align-items: end; border: 1px solid var(--line); border-radius: 10px; background: linear-gradient(to top, rgba(245,198,214,.65) 1px, transparent 1px) 0 0/100% 25%, #fff; padding: 14px 12px 8px; }
    .chart { height: 100%; display: grid; grid-template-columns: repeat(7, minmax(26px, 1fr)); gap: 9px; align-items: end; }
    .bar { min-width: 0; display: grid; gap: 7px; align-items: end; text-align: center; color: var(--muted); font-size: 11px; }
    .bar-fill { width: 100%; min-height: 14px; border-radius: 5px 5px 3px 3px; background: linear-gradient(180deg, #FF7B9C, #D48FB5); position: relative; }
    .bar-fill::before { content: attr(data-price); position: absolute; left: 50%; top: -22px; transform: translateX(-50%); color: var(--text); font-weight: 700; font-size: 11px; white-space: nowrap; }
    .airline-list { display: grid; gap: 9px; max-height: 230px; overflow: auto; }
    .airline { display: grid; grid-template-columns: 34px minmax(0, 1fr) auto; gap: 9px; align-items: center; padding: 8px; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
    .airline-logo { width: 34px; height: 34px; border-radius: 8px; display: grid; place-items: center; color: #fff; font-weight: 800; overflow: hidden; border: 1px solid rgba(245,198,214,.9); }
    .airline-logo span { font-size: 11px; }
    .airline strong { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
    .airline small { color: var(--muted); font-size: 11px; }
    .tag { display: inline-flex; align-items: center; min-height: 22px; padding: 0 7px; border-radius: 999px; background: #F0F5F0; color: var(--green); font-size: 11px; font-weight: 700; white-space: nowrap; }
    .tag.low-cost { background: #FFF5E8; color: var(--orange); }
    .table-card { overflow: hidden; }
    .table-toolbar { display: grid; grid-template-columns: minmax(200px, 1fr) auto; gap: 9px; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--line); background: rgba(255,232,238,.78); }
    .table-toolbar input { height: 36px; font-size: 13px; }
    .table-wrap { overflow: auto; max-height: 480px; }
    table { width: 100%; border-collapse: collapse; min-width: 880px; background: #fff; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; font-size: 13px; }
    th { position: sticky; top: 0; z-index: 1; background: #FFE8EE; color: #7B3D6B; font-size: 11px; }
    tbody tr:hover { background: #FFF0F5; }
    .price { font-size: 17px; color: var(--primary-dark); font-weight: 800; }
    .change.up { color: var(--red); font-weight: 800; }
    .change.down { color: var(--green); font-weight: 800; }
    .warn { color: var(--orange); font-weight: 800; }
    .empty { padding: 28px 14px; color: var(--muted); text-align: center; font-size: 13px; }
    .toast { position: fixed; right: 16px; bottom: 16px; width: min(340px, calc(100% - 32px)); padding: 12px 16px; border-radius: 12px; background: linear-gradient(145deg, #6B3D55, #3D2C3D); color: #fff; transform: translateY(16px); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 100; font-size: 13px; display: flex; align-items: center; gap: 8px; }
    .toast img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex: 0 0 auto; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .modal-backdrop { position: fixed; inset: 0; display: none; place-items: center; padding: 16px; background: rgba(61,44,61,.38); z-index: 20; }
    .modal-backdrop.open { display: grid; }
    .modal { width: min(520px, 100%); background: #fff; border-radius: var(--radius); border: 1px solid var(--line); }
    .modal-head, .modal-foot { padding: 13px 15px; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: #FFE8EE; border-bottom: 1px solid var(--line); }
    .modal-head h2 { margin: 0; font-size: 16px; }
    .modal-body { padding: 15px; display: grid; gap: 11px; }
    .modal-foot { justify-content: flex-end; border-top: 1px solid var(--line); border-bottom: 0; }
    .loopy-popup { position: fixed; right: 20px; bottom: 80px; z-index: 50; cursor: pointer; }
    .loopy-popup:hover { transform: scale(1.05); }
    .loopy-popup img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; box-shadow: 0 6px 20px rgba(232,90,122,.25); }
    .loopy-popup .popup-bubble { position: absolute; right: 58px; top: 50%; transform: translateY(-50%); background: #fff; border: 1px solid var(--line); border-radius: 12px 12px 12px 4px; padding: 6px 12px; white-space: nowrap; font-size: 12px; color: var(--text); opacity: 0; pointer-events: none; transition: opacity .3s; }
    .loopy-popup:hover .popup-bubble { opacity: 1; }
    .carrier-cell { display: grid; grid-template-columns: 32px minmax(0, 1fr); gap: 8px; align-items: center; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .side { position: static; } .destination-card { grid-template-columns: 1fr; } .grid-2 { grid-template-columns: 1fr; } .metrics { grid-template-columns: repeat(2, 1fr); } }
  </style>
  <link rel="icon" type="image/jpeg" href="loopy.jpg">
</head>
<body>
<div class="loopy-floating" id="loopyFloating"></div>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="loopy-avatar" id="loopyAvatar" title="我是 Loopy！">
        <img src="loopy.jpg" alt="Loopy" />
        <span class="badge">&#9829;</span>
      </div>
      <div class="brand-text">
        <h1><span class="highlight">Loopy</span> &#x2708; 机票监控</h1>
        <div class="tagline">&#x1F43E; 粉色小浣熊帮你盯着机票价格</div>
      </div>
    </div>
    <div class="status-strip">
      <span class="pill"><span class="dot"></span><span id="syncStatus">实时监控中</span></span>
      <span class="pill"><span id="lastUpdated">--:--:--</span></span>
    </div>
  </div>
  <div class="layout">
    <div class="side panel">
      <div class="section">
        <h2>&#9829; 搜索航班</h2>
        <p class="section-sub">告诉我从哪到哪，Loopy 帮你盯着价格</p>
        <form id="searchForm" class="form-grid">
          <div class="field">
            <label>出发城市</label>
            <div class="row-2">
              <input id="fromCity" list="cityList" value="上海" />
              <datalist id="cityList">
                <option value="上海"><option value="北京"><option value="广州"><option value="深圳">
                <option value="成都"><option value="杭州"><option value="南京"><option value="重庆">
                <option value="武汉"><option value="西安"><option value="厦门"><option value="昆明">
                <option value="青岛"><option value="长沙"><option value="三亚"><option value="大连">
                <option value="东京"><option value="大阪"><option value="首尔"><option value="香港">
                <option value="曼谷"><option value="新加坡"><option value="普吉岛"><option value="吉隆坡">
                <option value="伦敦"><option value="巴黎"><option value="纽约"><option value="悉尼">
                <option value="洛杉矶"><option value="台北"><option value="澳门"><option value="清迈">
              </datalist>
              <input id="toCity" list="cityList" value="东京" />
            </div>
          </div>
          <div class="field">
            <label>出发日期</label>
            <input id="departDate" type="date" />
          </div>
          <div class="row-2">
            <div class="field">
              <label>提醒价格</label>
              <input id="maxPrice" type="number" value="650" min="100" max="99999" />
            </div>
            <div class="field">
              <label>刷新间隔(秒)</label>
              <input id="interval" type="number" value="30" min="5" max="600" />
            </div>
          </div>
          <div class="button-row">
            <button class="btn" type="submit">&#9829; Loopy 开始监控</button>
            <button class="btn icon-btn" id="swapBtn" type="button" title="交换">&#x21C4;</button>
          </div>
        </form>
      </div>
      <div class="section">
        <h2>&#9829; 舱位选择</h2>
        <div class="segmented" style="margin-top:9px">
          <button data-cabin="经济舱" class="active">经济舱</button>
          <button data-cabin="超级经济舱">超级经济舱</button>
          <button data-cabin="商务舱">商务舱</button>
        </div>
      </div>
      <div class="section">
        <h2>&#9829; 筛选</h2>
        <div class="checks" id="filters">
          <label class="check"><input type="checkbox" value="direct" /> 仅直飞</label>
          <label class="check"><input type="checkbox" value="baggage" /> 含行李额</label>
          <label class="check"><input type="checkbox" value="refundable" /> 可退改</label>
          <label class="check"><input type="checkbox" value="alert" /> 仅看低价提醒</label>
        </div>
        <div class="ai-panel">
          <div class="ai-row">
            <p class="ai-prompt" id="aiPrompt">Loopy 正在寻找最佳风景照...</p>
            <span class="ai-status" id="aiStatus">就绪</span>
          </div>
          <button class="btn" id="refreshPhotoBtn" type="button" style="height:32px;font-size:12px">&#9829; 换一张风景照</button>
        </div>
      </div>
    </div>
    <div class="content">
      <div class="panel destination-card">
        <div class="destination-visual">
          <img class="main-photo loading" id="destinationPhoto" src="" alt="目的地风景" />
          <img src="loopy.jpg" class="loopy-watermark" alt="" />
          <span class="destination-badge" id="destinationBadge"><img src="loopy.jpg" class="mini-loopy" alt="" /> 目的地景点</span>
          <span class="image-counter" id="imageCounter">1/3</span>
          <button class="gallery-btn prev" id="prevPhotoBtn" type="button" title="上一张">&#x2039;</button>
          <button class="gallery-btn next" id="nextPhotoBtn" type="button" title="下一张">&#x203a;</button>
          <button class="destination-refresh" id="refreshDestinationBtn" type="button" title="换一张">&#x21bb;</button>
        </div>
        <div class="destination-copy">
          <div class="destination-meta" id="destinationChips"></div>
          <h2 id="destinationTitle">目的地风景</h2>
          <p id="destinationDesc">Loopy 正在为你寻找当地最美的景色...</p>
        </div>
      </div>
      <div class="panel">
        <div class="content-head">
          <div>
            <h2 id="routeTitle">所有航班</h2>
            <p id="routeSub">Loopy 正在监控机票价格</p>
          </div>
          <div class="head-actions">
            <button class="btn secondary" id="exportBtn">导出 CSV</button>
            <button class="btn secondary" id="apiBtn">API</button>
          </div>
        </div>
        <div class="metrics">
          <div class="metric">
            <span>最低价</span>
            <strong id="minPrice">&#165;--</strong>
            <small id="minCarrier">--</small>
          </div>
          <div class="metric">
            <span>均价</span>
            <strong id="avgPrice">&#165;--</strong>
            <small>实时计算</small>
          </div>
          <div class="metric">
            <span>低价提醒</span>
            <strong id="alertCount">0</strong>
            <small>低于提醒价</small>
          </div>
          <div class="metric">
            <span>航班数</span>

<script>
(function(){
setTimeout(function(){
var e={};document.querySelectorAll("[id]").forEach(function(n){e[n.id]=n;});

var D={"东京":["https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Tokyo_SkyTree_2017.jpg/900px-Tokyo_SkyTree_2017.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/e6/Tokyo_Tower_2020.jpg/900px-Tokyo_Tower_2020.jpg"],"上海":["https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Shanghai_skyline_from_the_Bund_2014.jpg/900px-Shanghai_skyline_from_the_Bund_2014.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Pudong_skyline_Shanghai_2015.jpg/900px-Pudong_skyline_Shanghai_2015.jpg"],"北京":["https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Forbidden_City_2019.jpg/900px-Forbidden_City_2019.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Great_Wall_of_China_2018.jpg/900px-Great_Wall_of_China_2018.jpg"],"香港":["https://upload.wikimedia.org/wikipedia/commons/thumb/5/5d/Hong_Kong_Night_Skyline_2018.jpg/900px-Hong_Kong_Night_Skyline_2018.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/2/27/Victoria_Harbour_2019.jpg/900px-Victoria_Harbour_2019.jpg"],"首尔":["https://upload.wikimedia.org/wikipedia/commons/thumb/2/20/Gyeongbokgung_Palace_2016.jpg/900px-Gyeongbokgung_Palace_2016.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/d/d0/N_Seoul_Tower_2019.jpg/900px-N_Seoul_Tower_2019.jpg"],"曼谷":["https://upload.wikimedia.org/wikipedia/commons/thumb/7/7c/Wat_Phra_Kaew_2015.jpg/900px-Wat_Phra_Kaew_2015.jpg","https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Wat_Arun_2019.jpg/900px-Wat_Arun_2019.jpg"]};

var A=[{c:"CA",n:"中国国航",r:"中国",l:false,o:"#E60012"},{c:"MU",n:"东方航空",r:"中国",l:false,o:"#0A5C9E"},{c:"CZ",n:"南方航空",r:"中国",l:false,o:"#008080"},{c:"HU",n:"海南航空",r:"中国",l:false,o:"#E45B5F"},{c:"9C",n:"春秋航空",r:"中国",l:true,o:"#00A95C"},{c:"JL",n:"日本航空",r:"日本",l:false,o:"#D42028"},{c:"NH",n:"全日空",r:"日本",l:false,o:"#005BAC"},{c:"KE",n:"大韩航空",r:"韩国",l:false,o:"#00488B"},{c:"SQ",n:"新加坡航空",r:"新加坡",l:false,o:"#F0AB00"},{c:"CX",n:"国泰航空",r:"香港",l:false,o:"#006747"},{c:"EK",n:"阿联酋航空",r:"阿联酋",l:false,o:"#D91C21"},{c:"BA",n:"英国航空",r:"英国",l:false,o:"#003399"}];

var S={from:"上海",to:"东京",date:(function(){var d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);})(),maxPrice:650,interval:30,cabin:"经济舱",rows:[],filters:{}};
var I=[],p=0;

function rc(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pd(n){return String(n).padStart(2,"0");}

function lc(c){if(D[c]){I=[].concat(D[c]);}else{I=["https://picsum.photos/seed/"+c+"/900/560"];}p=0;si();}
function si(){if(!I.length)return;var i=p%I.length;e.destinationPhoto.classList.add("loading");e.destinationPhoto.onload=function(){e.destinationPhoto.classList.remove("loading");};e.destinationPhoto.onerror=function(){p++;si();};e.destinationPhoto.src=I[i];e.imageCounter.textContent=(i+1)+"/"+I.length;}

function rd(){e.destinationBadge.innerHTML='<img src="loopy.jpg" class="mini-loopy" alt="" /> '+S.to+' . 真实风景照';e.destinationTitle.textContent=S.to+" - 当地特色风光";e.aiPrompt.textContent="Loopy 为你找到 "+I.length+" 张 "+S.to+" 的真实风景照";e.aiStatus.textContent=I.length+" 张照片";}

function gn(){var b=S.cabin==="商务舱"?1780:920;S.rows=A.map(function(a,i){var h=6+(i%13),m=[0,10,20,30,45,55][i%6];var pr=Math.max(260,b+rc(-160,280)-(a.l?rc(80,170):0));return{...a,fn:a.c+rc(1001,9999),dp:pd(h)+":"+pd(m),ar:pd((h+3)%24)+":"+pd(m),md:["A320","A321neo","A330","A350","B737-800","B787-9"][i%7],pr:pr,ch:rc(-90,110),st:pr<=S.maxPrice?"已触发提醒":"可订"};}).sort(function(a,b){return a.pr-b.pr;});}

function fl(){return S.rows.filter(function(r){if(S.filters.direct&&r.st>0)return false;if(S.filters.alert&&r.pr>S.maxPrice)return false;return true;});}

function ra(){var r=fl();e.routeTitle.textContent=S.from+" -> "+S.to;e.lastUpdated.textContent=new Date().toLocaleTimeString("zh-CN",{hour12:false});rd();var a=S.rows;e.minPrice.textContent=a[0]?"¥"+a[0].pr:"¥--";e.avgPrice.textContent="¥"+Math.round(a.reduce(function(s,x){return s+x.pr;},0)/a.length);e.alertCount.textContent=a.filter(function(x){return x.pr<=S.maxPrice;}).length;e.flightCount.textContent=r.length;e.airlineList.innerHTML=A.map(function(x){var y=S.rows.find(function(z){return z.c===x.c;});return'<div class="airline"><div class="airline-logo" style="background:'+x.o+'"><span>'+x.c.slice(0,2)+'</span></div><div><strong>'+x.n+'</strong><small>'+x.r+(y?" . ¥"+y.pr:"")+'</small></div><span class="tag">'+(y?y.st:"待同步")+'</span></div>';}).join("");e.flightRows.innerHTML=r.length?r.map(function(x){return'<tr><td><div class="carrier-cell"><div class="airline-logo" style="background:'+x.o+'"><span>'+x.c.slice(0,2)+'</span></div><div><strong>'+x.n+'</strong></div></div></td><td>'+x.fn+'</td><td>'+x.dp+"-"+x.ar+'</td><td>PVG-NRT</td><td>'+x.md+'</td><td>'+S.cabin+'</td><td class="price">¥'+x.pr+'</td><td class="change '+(x.ch>0?"up":"down")+'">'+(x.ch>0?"+":"")+'¥'+x.ch+'</td><td>'+x.st+'</td></tr>';}).join(""):'<tr><td colspan="9"><div class="empty">Loopy 没有找到符合条件的航班</div></td></tr>';e.resultText.textContent=r.length+" 条结果";var aa=a.filter(function(x){return x.pr<=S.maxPrice;});if(aa.length)st(aa.length+" 个航班低于提醒价");}

function st(m){e.toastMessage.textContent=m;e.toast.classList.add("show");clearTimeout(st.t);st.t=setTimeout(function(){e.toast.classList.remove("show");},3200);}

function es(){var c="";c+=["航司","代码","类型","地区","航班","价格","状态"].map(function(x){return'"'+x+'"';}).join(",")+"\n";fl().forEach(function(r){c+=[r.n,r.c,r.l?"廉价":"全服务",r.r,r.fn,"¥"+r.pr,r.st].map(function(x){return'"'+String(x).replace(/"/g,'""')+'"';}).join(",")+"\n";});var b=new Blob(["\ufeff"+c],{type:"text/csv;charset=utf-8"});var u=URL.createObjectURL(b);var a=document.createElement("a");a.href=u;a.download="机票.csv";a.click();URL.revokeObjectURL(u);st("已导出");}

function stt(){clearInterval(S.tt);S.tt=setInterval(function(){gn();ra();},S.interval*1000);e.syncStatus.textContent="每 "+S.interval+" 秒刷新";}

e.searchForm.addEventListener("submit",function(ev){ev.preventDefault();S.from=e.fromCity.value.trim()||"上海";S.to=e.toCity.value.trim()||"东京";S.date=e.departDate.value||(function(){var d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);})();S.maxPrice=Number(e.maxPrice.value||650);S.interval=Number(e.interval.value||30);gn();lc(S.to);ra();stt();st(S.from+" 到 "+S.to+" 已更新");});
e.swapBtn.addEventListener("click",function(){var f=e.fromCity.value;e.fromCity.value=e.toCity.value;e.toCity.value=f;S.to=e.toCity.value.trim()||S.to;lc(S.to);rd();});
e.refreshPhotoBtn.addEventListener("click",function(){p=(p+2)%Math.max(1,I.length);si();rd();});
e.refreshDestinationBtn.addEventListener("click",function(){p=(p+1)%Math.max(1,I.length);si();});
e.nextPhotoBtn.addEventListener("click",function(){if(I.length){p=(p+1)%I.length;si();}});
e.prevPhotoBtn.addEventListener("click",function(){if(I.length){p=(p-1+I.length)%I.length;si();}});
document.querySelectorAll(".segmented button").forEach(function(b){b.addEventListener("click",function(){document.querySelectorAll(".segmented button").forEach(function(x){x.classList.remove("active");});b.classList.add("active");S.cabin=b.dataset.cabin;});});
e.filters.addEventListener("change",function(ev){S.filters[ev.target.value]=ev.target.checked;ra();});
e.tableSearch.addEventListener("input",function(){ra();});
e.exportBtn.addEventListener("click",es);
e.apiBtn.addEventListener("click",function(){e.apiModal.classList.add("open");});
e.closeApi.addEventListener("click",function(){e.apiModal.classList.remove("open");});
e.apiModal.addEventListener("click",function(ev){if(ev.target===e.apiModal)e.apiModal.classList.remove("open");});
e.saveApi.addEventListener("click",function(){localStorage.setItem("fc",JSON.stringify({url:e.apiUrl.value,token:e.apiToken.value}));e.apiModal.classList.remove("open");st("已保存");});
e.resetApi.addEventListener("click",function(){localStorage.removeItem("fc");e.apiUrl.value="";e.apiToken.value="";st("已重置");});
e.loopyAvatar.addEventListener("click",function(){st("Hi！我是 Loopy！");});
e.loopyPopup.addEventListener("click",function(){st("Loopy 说：放心吧！");});

gn();lc(S.to);ra();stt();
},100);
})();
</script>
</body>
