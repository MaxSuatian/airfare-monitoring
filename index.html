p { color: #9A7B8A; margin: 8px 0 20px; font-size: 14px; }
.btn { background: linear-gradient(145deg, #FF7B9C, #E85A7A); color: #fff; border: 0; border-radius: 12px; padding: 12px 32px; font-size: 16px; cursor: pointer; font-weight: 700; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(232,90,122,.3); }
