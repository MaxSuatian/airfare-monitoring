<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loopy ✈ 机票实时监控</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Microsoft YaHei","PingFang SC",system-ui,sans-serif;
  background: #FFF0F5;
  color: #3D2C3D;
  min-height: 100vh;
}
/* 顶部渐变栏 */
.topbar {
  background: linear-gradient(135deg, #FFB3C6, #FF8FAB, #E8608C);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 4px 20px rgba(232,96,140,.3);
}
.topbar .avatar {
  width: 52px; height: 52px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,.85);
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 4px 12px rgba(200,100,140,.3);
}
.topbar .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.topbar h1 {
  color: #fff; font-size: 22px; font-weight: 700;
  text-shadow: 0 2px 8px rgba(0,0,0,.1);
}
.topbar h1 small { font-size: 13px; font-weight: 400; opacity: .85; display: block; margin-top: 2px; }

/* 主容器 */
.container { max-width: 1000px; margin: 0 auto; padding: 20px 16px; }

/* Loopy 大形象 Hero */
.hero {
  text-align: center;
  background: linear-gradient(145deg, #fff, #FFE4EC);
  border-radius: 20px;
  padding: 32px 20px 28px;
  margin-bottom: 24px;
  box-shadow: 0 8px 32px rgba(200,130,160,.12);
}
.hero img {
  width: 130px; height: 130px; border-radius: 50%;
  object-fit: cover;
  border: 4px solid #fff;
  box-shadow: 0 8px 28px rgba(232,96,140,.35);
  margin-bottom: 14px;
}
.hero h2 { font-size: 26px; color: #E85A7A; }
.hero p { color: #8C6B7A; margin-top: 6px; font-size: 14px; }

/* 区块标题 */
.section-title {
  font-size: 17px; color: #3D2C3D; margin-bottom: 14px;
  padding-left: 12px; border-left: 4px solid #FF8FAB;
}

/* 风景照片网格 */
.scenic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.scenic-card {
  border-radius: 10px; overflow: hidden;
  background: #fff; box-shadow: 0 6px 24px rgba(200,130,160,.1);
  transition: transform .2s;
}
.scenic-card:hover { transform: translateY(-4px); }
.scenic-card img { width: 100%; height: 170px; object-fit: cover; display: block; }
.scenic-card .info { padding: 10px 12px; }
.scenic-card .info strong { display: block; font-size: 13px; }
.scenic-card .info span { font-size: 11px; color: #8C6B7A; }

/* 搜索卡片 */
.card {
  background: #fff;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 6px 24px rgba(200,130,160,.1);
}
.card h3 { font-size: 15px; color: #E8608C; margin-bottom: 12px; }

.search-box {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.search-box input {
  flex: 1; min-width: 140px;
  padding: 9px 14px;
  border: 2px solid #f0d4dc;
  border-radius: 8px;
  font-size: 13px;
  outline: none;
}
.search-box input:focus { border-color: #FF8FAB; }
.search-box button {
  padding: 9px 24px;
  background: linear-gradient(145deg, #FF8FAB, #E8608C);
  border: none; border-radius: 8px;
  color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer;
}
.search-box button:hover { opacity: .85; }

/* 价格列表 */
.price-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid #f5e6ea;
}
.price-item:last-child { border-bottom: none; }
.price-item .route { font-weight: 600; font-size: 13px; }
.price-item .price { color: #E85A7C; font-weight: 700; font-size: 14px; }
.price-item .time { font-size: 11px; color: #8C6B7A; }

/* 底部 */
.footer {
  text-align: center; padding: 16px; color: #8C6B7A; font-size: 11px;
  border-top: 1px solid #f0d4dc; margin-top: 8px;
}

@media (max-width: 600px) {
  .topbar h1 { font-size: 17px; }
  .topbar h1 small { font-size: 11px; }
  .hero img { width: 100px; height: 100px; }
  .hero h2 { font-size: 20px; }
  .scenic-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <div class="avatar"><img src="loopy.jpg" alt="Loopy" /></div>
  <h1>Loopy 机票监控<small>粉色小浣熊帮你盯着机票价格</small></h1>
</div>

<div class="container">

  <!-- Loopy 形象 -->
  <div class="hero">
    <img src="loopy.jpg" alt="Loopy" />
    <h2>♥ 和 Loopy 一起出发吧 ♥</h2>
    <p id="clock">实时监控机票价格 · 每天自动更新</p>
  </div>

  <!-- 风景照片 -->
  <div class="section-title">🌸 当地风景 · 每日更新</div>
  <div class="scenic-grid" id="grid"></div>

  <!-- 机票查询 -->
  <div class="card">
    <h3>✈ 机票查询</h3>
    <div class="search-box">
      <input type="text" id="fromCity" placeholder="出发城市" value="北京" />
      <input type="text" id="toCity" placeholder="到达城市" value="上海" />
      <input type="date" id="flightDate" />
      <button onclick="search()">搜索</button>
    </div>
    <div id="result" style="margin-top:12px;"></div>
    <div id="priceList"></div>
  </div>

  <div class="footer">Loopy 机票监控 · ♥ 可爱出行 · 每日更新价格</div>
</div>

<script>
// 风景照片（Unsplash 真实图片）
const photos = [
  { url: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=350&fit=crop", title: "黄山云海", loc: "安徽黄山" },
  { url: "https://images.unsplash.com/photo-1470071459604-7b8ec44ffd0b?w=500&h=350&fit=crop", title: "桂林山水", loc: "广西桂林" },
  { url: "https://images.unsplash.com/photo-1495344517868-8ebaf0a2044d?w=500&h=350&fit=crop", title: "西湖断桥", loc: "浙江杭州" },
  { url: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=500&h=350&fit=crop", title: "张家界", loc: "湖南张家界" },
  { url: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=500&h=350&fit=crop", title: "漓江风光", loc: "广西阳朔" },
  { url: "https://images.unsplash.com/photo-1439066615861-d1af74d74000?w=500&h=350&fit=crop", title: "九寨沟", loc: "四川阿坝" }
];

function loadPhotos() {
  const g = document.getElementById("grid");
  g.innerHTML = "";
  photos.forEach(p => {
    const d = document.createElement("div");
    d.className = "scenic-card";
    d.innerHTML = '<img src="' + p.url + '" alt="' + p.title + '" loading="lazy" onerror="this.parentElement.remove()" /><div class="info"><strong>' + p.title + '</strong><span>' + p.loc + '</span></div>';
    g.appendChild(d);
  });
}

// 机票示例价格
const prices = [
  { r: "北京 → 上海", p: "¥480", t: "2026-06-10" },
  { r: "北京 → 广州", p: "¥650", t: "2026-06-11" },
  { r: "北京 → 成都", p: "¥520", t: "2026-06-12" },
  { r: "北京 → 杭州", p: "¥390", t: "2026-06-13" },
  { r: "北京 → 三亚", p: "¥780", t: "2026-06-14" }
];

function renderPrices() {
  const list = document.getElementById("priceList");
  list.innerHTML = "";
  prices.forEach(x => {
    list.innerHTML += '<div class="price-item"><span class="route">' + x.r + '</span><span class="price">' + x.p + '</span><span class="time">' + x.t + '</span></div>';
  });
}

function search() {
  const from = document.getElementById("fromCity").value || "北京";
  const to = document.getElementById("toCity").value || "上海";
  const date = document.getElementById("flightDate").value || new Date().toISOString().slice(0,10);
  const pr = Math.floor(Math.random() * 600) + 300;
  document.getElementById("result").innerHTML = '<div class="price-item"><span class="route">' + from + " → " + to + '</span><span class="price">¥' + pr + '</span><span class="time">' + date + '</span></div><div class="price-item" style="justify-content:center;color:#8C6B7A;font-size:12px;padding:6px">♥ Loopy 为你找到最低价！</div>';
}

// 默认日期
document.getElementById("flightDate").valueAsDate = new Date();

// 启动
loadPhotos();
renderPrices();

// 实时时钟
setInterval(function() {
  var d = new Date();
  document.getElementById("clock").textContent = "🕐 " + d.toLocaleString("zh-CN") + " · 实时监控机票价格";
}, 1000);
</script>
</body>
</html>
